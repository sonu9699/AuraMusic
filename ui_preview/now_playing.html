<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>AuraMusic - Now Playing</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0D0D0D;
    --surface: #141414;
    --border: #2A2A2A;
    --red: #E8002D;
    --red-glow: rgba(232, 0, 45, 0.3);
    --white: #FFFFFF;
    --gray: #A0A0A0;
    --gray-dim: #3A3A3A;
  }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Sora', sans-serif;
    width: 390px;
    min-height: 844px;
    overflow-x: hidden;
    position: relative;
  }

  /* Atmospheric glow behind album art */
  .atmosphere {
    position: absolute;
    top: 180px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 320px;
    background: radial-gradient(ellipse at center, rgba(232,0,45,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 844px;
    padding-bottom: 32px;
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 52px 24px 16px;
  }
  .top-bar .icon-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: var(--white);
    cursor: pointer;
  }
  .top-bar .icon-btn svg { width: 24px; height: 24px; }
  .now-playing-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gray);
    text-transform: uppercase;
  }

  /* ALBUM ART */
  .album-section {
    padding: 24px 32px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .album-art-wrapper {
    position: relative;
    width: 100%;
    max-width: 310px;
  }
  .album-art {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 20px;
    background: linear-gradient(135deg, #1a0005 0%, #2d000a 30%, #0f0f0f 60%, #1a0008 100%);
    position: relative;
    overflow: hidden;
    animation: float 6s ease-in-out infinite;
    box-shadow: 0 8px 60px rgba(232,0,45,0.25), 0 2px 20px rgba(0,0,0,0.8);
  }
  .album-art-inner {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(232,0,45,0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 70%, rgba(120,0,15,0.3) 0%, transparent 45%),
      linear-gradient(220deg, #1f0008, #0a0a0a, #1a0005);
  }
  .album-art-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(45deg, transparent 48%, rgba(232,0,45,0.08) 49%, rgba(232,0,45,0.08) 51%, transparent 52%),
      linear-gradient(-30deg, transparent 65%, rgba(200,0,20,0.06) 66%, rgba(200,0,20,0.06) 67%, transparent 68%);
  }
  .album-glow {
    position: absolute;
    bottom: -30px;
    left: 50%; transform: translateX(-50%);
    width: 80%; height: 60px;
    background: radial-gradient(ellipse at center, rgba(232,0,45,0.4) 0%, transparent 70%);
    pointer-events: none;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  /* SONG INFO */
  .song-info {
    padding: 40px 24px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .song-meta { flex: 1; }
  .song-title {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -0.3px;
  }
  .song-artist {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--gray);
    margin-top: 4px;
  }
  .hi-res-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border: 1px solid var(--red);
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--red);
    letter-spacing: 0.05em;
    margin-top: 8px;
  }
  .like-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    margin-top: 2px;
  }
  .like-btn svg { width: 24px; height: 24px; }

  /* PROGRESS */
  .progress-section {
    padding: 24px 24px 0;
  }
  .progress-track {
    width: 100%; height: 3px;
    background: var(--border);
    border-radius: 99px;
    position: relative;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    width: 47%;
    background: var(--red);
    border-radius: 99px;
    position: relative;
  }
  .progress-thumb {
    position: absolute;
    right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    background: var(--white);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(232,0,45,0.5);
  }
  .progress-times {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .time-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gray);
  }

  /* CONTROLS */
  .controls {
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ctrl-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--gray);
    transition: color 0.2s;
  }
  .ctrl-btn:hover { color: var(--white); }
  .ctrl-btn svg { width: 22px; height: 22px; }
  .ctrl-btn.primary { color: var(--white); }
  .ctrl-btn.primary svg { width: 26px; height: 26px; }
  .play-btn {
    width: 72px; height: 72px;
    background: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 0 0 var(--red-glow);
    animation: pulse-glow 2.5s ease-in-out infinite;
    transition: transform 0.1s;
  }
  .play-btn:active { transform: scale(0.95); }
  .play-btn svg { width: 30px; height: 30px; color: var(--white); }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(232,0,45,0.4), 0 0 40px rgba(232,0,45,0.15); }
    50% { box-shadow: 0 0 30px rgba(232,0,45,0.6), 0 0 60px rgba(232,0,45,0.25); }
  }

  /* SECONDARY CONTROLS */
  .secondary-controls {
    padding: 20px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
  .sec-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--gray);
    position: relative;
  }
  .sec-btn svg { width: 20px; height: 20px; }
  .sec-btn.active { color: var(--red); }
  .active-dot {
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    background: var(--red);
    border-radius: 50%;
  }

  /* WAVEFORM */
  .waveform {
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 48px;
  }
  .wave-bar {
    width: 3px;
    background: var(--red);
    border-radius: 2px;
    opacity: 0.6;
    animation: wave 1.2s ease-in-out infinite;
  }
  .wave-bar:nth-child(1)  { height: 12px; animation-delay: 0s; }
  .wave-bar:nth-child(2)  { height: 22px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3)  { height: 30px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4)  { height: 18px; animation-delay: 0.15s; }
  .wave-bar:nth-child(5)  { height: 34px; animation-delay: 0.05s; }
  .wave-bar:nth-child(6)  { height: 24px; animation-delay: 0.25s; }
  .wave-bar:nth-child(7)  { height: 38px; animation-delay: 0.1s; }
  .wave-bar:nth-child(8)  { height: 28px; animation-delay: 0.3s; }
  .wave-bar:nth-child(9)  { height: 32px; animation-delay: 0.08s; }
  .wave-bar:nth-child(10) { height: 20px; animation-delay: 0.18s; }
  .wave-bar:nth-child(11) { height: 36px; animation-delay: 0.12s; }
  .wave-bar:nth-child(12) { height: 26px; animation-delay: 0.22s; }
  .wave-bar:nth-child(13) { height: 40px; animation-delay: 0.07s; }
  .wave-bar:nth-child(14) { height: 22px; animation-delay: 0.28s; }
  .wave-bar:nth-child(15) { height: 16px; animation-delay: 0.14s; }
  .wave-bar:nth-child(16) { height: 30px; animation-delay: 0.35s; }
  .wave-bar:nth-child(17) { height: 24px; animation-delay: 0.06s; }
  .wave-bar:nth-child(18) { height: 18px; animation-delay: 0.2s; }
  .wave-bar:nth-child(19) { height: 28px; animation-delay: 0.16s; }
  .wave-bar:nth-child(20) { height: 14px; animation-delay: 0.32s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(1); opacity: 0.5; }
    50% { transform: scaleY(0.4); opacity: 0.9; }
  }

  /* QUEUE HANDLE */
  .queue-handle {
    margin: 20px 24px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .queue-handle-left {
    display: flex; align-items: center; gap: 10px;
  }
  .queue-handle-pill {
    width: 32px; height: 4px;
    background: var(--border);
    border-radius: 99px;
  }
  .queue-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .queue-handle svg { width: 18px; height: 18px; color: var(--gray); }
</style>
</head>
<body>
