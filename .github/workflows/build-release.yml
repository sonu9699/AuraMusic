name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Remove local org.gradle.java.home from gradle.properties
        run: |
          sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Universal Debug APK
        run: ./gradlew assembleUniversalDebug

      - name: Verify Built APK
        run: |
          ls -la app/build/outputs/apk/universal/debug/

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/universal/debug/app-universal-debug.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
